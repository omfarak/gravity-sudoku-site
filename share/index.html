<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Open a shared Gravity Sudoku puzzle.">
  <title>Gravity Sudoku | Open Shared Puzzle</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #081120;
      --panel: rgba(9, 19, 36, 0.86);
      --line: rgba(125, 211, 252, 0.18);
      --text: #eff6ff;
      --muted: #bfd2ec;
      --accent: #7dd3fc;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(125, 211, 252, 0.2), transparent 30%),
        linear-gradient(180deg, #081120 0%, #02060d 100%);
    }

    .card {
      max-width: 720px;
      width: 100%;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 32px;
      text-align: center;
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.35);
    }

    h1 { margin-top: 0; }
    p { color: var(--muted); line-height: 1.7; }

    .actions {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 24px;
    }

    a {
      text-decoration: none;
      color: var(--text);
      padding: 12px 16px;
      border-radius: 999px;
      background: rgba(125, 211, 252, 0.12);
      border: 1px solid rgba(125, 211, 252, 0.24);
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Open Shared Puzzle</h1>
    <p>
      If Gravity Sudoku is installed, use the button below to open the shared
      puzzle directly in the app.
    </p>
    <div class="actions">
      <a id="open-app" href="#">Open in Gravity Sudoku</a>
      <a href="/gravity-sudoku-site/support/">Need help?</a>
    </div>
  </main>
  <script>
    const params = new URLSearchParams(window.location.search);
    const data = params.get('data') || '';
    const appLink = data
      ? `gravitysudoku://share?data=${encodeURIComponent(data)}`
      : 'gravitysudoku://share';
    document.getElementById('open-app').href = appLink;
  </script>
</body>
</html>
